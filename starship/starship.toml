"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ ]()\
$os\
$username\

$directory\

$git_branch\
$git_status\

$package\

$c\
$cpp\
$rust\
$zig\
$swift\
$golang\

$python\
$lua\
$php\

$java\
$kotlin\
$dotnet\

$nodejs\
$bun\
$deno\

$haskell\

$cmake\
$meson\
$gradle\
$maven\

$nix_shell\
$conda\
$docker_context\

$cmd_duration\
$line_break\
$character
"""

[os]
disabled = false

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bold fg:blue"
style_root = "bold fg:blue"
format = '[ $user ]($style)'

[directory]

[git_branch]
symbol = " "
# style = "bold fg:green"

[git_status]
style = "bold fg:purple"

[c]
disabled = false
symbol = ""

[cpp]
disabled = false
symbol = " "

[rust]
symbol = " "

[zig]
symbol = " "

[swift]
symbol = " "

[golang]
symbol = " "

[python]
symbol = " "

[lua]
symbol = " "

[php]
symbol = " "

[java]
symbol = " "

[kotlin]
symbol = " "

[dotnet]
symbol = " "

[nodejs]
symbol = "󰎙 "

[bun]
symbol = " "

[deno]
symbol = " "

[haskell]
symbol = " "

[cmake]
symbol = " "

[meson]
symbol = "󰔷 "

[gradle]
symbol = " "

[maven]
symbol = " "

[package]
# format = '[[ $symbol($version) ](fg:t0 bg:green)]($style)'

[nix_shell]
symbol = " "

[conda]
symbol = " "
ignore_base = false

[docker_context]
symbol = " "

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ ](bold fg:green)'
error_symbol = '[ ](bold fg:red)'
vimcmd_symbol = '[ ](bold fg:green)'
vimcmd_replace_one_symbol = '[ ](bold fg:lavender)'
vimcmd_replace_symbol = '[ ](bold fg:lavender)'
vimcmd_visual_symbol = '[ ](bold fg:yellow)'

[cmd_duration]
show_milliseconds = false
format = "in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000
